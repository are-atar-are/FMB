name: Build and Distribute FMB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple certificate and provisioning profiles
        env:
          P12_PASSWORD: "*89Morokolo2021#"
          KEYCHAIN_PASSWORD: "*89Morokolo2021#"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificate (tr removes newlines)
          cat .github/secrets/BUILD_CERTIFICATE_BASE64.txt | tr -d '\n' | base64 -d > $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Import certificate with private key
          # Try with legacy OpenSSL first (for old RC2-40-CBC encryption)
          echo "Attempting to decrypt certificate with OpenSSL legacy..."
          openssl pkcs12 -legacy -in $CERTIFICATE_PATH -out $RUNNER_TEMP/certificate.pem -nodes -passin pass:"$P12_PASSWORD" || \
          (echo "Legacy failed, trying standard OpenSSL..." && openssl pkcs12 -in $CERTIFICATE_PATH -out $RUNNER_TEMP/certificate.pem -nodes -passin pass:"$P12_PASSWORD") || \
          echo "OpenSSL decryption failed"
          
          # Import the p12 file
          echo "Importing certificate to keychain..."
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -T /usr/bin/codesign -T /usr/bin/security || \
          (echo "P12 import failed, trying PEM..." && security import $RUNNER_TEMP/certificate.pem -k $KEYCHAIN_PATH -A -T /usr/bin/codesign) || \
          echo "All import methods failed"
          
          # Also import to default keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign 2>/dev/null || true
          
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # List installed identities for debugging
          echo "Installed identities:"
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Decode the provisioning profile (tr removes newlines)
          cat .github/secrets/PROVISION_PROFILE_BASE64.txt | tr -d '\n' | base64 -d > $RUNNER_TEMP/FMB_Ad_Hoc.mobileprovision
          echo "Decoded provisioning profile"
          ls -la $RUNNER_TEMP/FMB_Ad_Hoc.mobileprovision
          
          # Extract UUID from the provisioning profile using openssl (handles old encryption)
          PROFILE_UUID=$(openssl smime -inform DER -verify -noverify -in $RUNNER_TEMP/FMB_Ad_Hoc.mobileprovision 2>/dev/null | grep -a "<key>UUID</key>" -A1 | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | tr -d '\n')
          echo "Profile UUID: '$PROFILE_UUID'"
          
          # Also extract the profile name
          PROFILE_NAME=$(openssl smime -inform DER -verify -noverify -in $RUNNER_TEMP/FMB_Ad_Hoc.mobileprovision 2>/dev/null | grep -a "<key>Name</key>" -A1 | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | tr -d '\n')
          echo "Profile Name: '$PROFILE_NAME'"
          
          # If UUID is empty, use a default name
          if [ -z "$PROFILE_UUID" ]; then
            echo "Warning: Could not extract UUID, using filename"
            PROFILE_UUID="FMB_Ad_Hoc"
          fi
          
          # Copy to the provisioning profiles directory with UUID as filename
          cp $RUNNER_TEMP/FMB_Ad_Hoc.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Installed provisioning profile with UUID: $PROFILE_UUID"
          
          # List installed profiles
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS Archive
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer
        run: |
          cd ios
          xcodebuild -workspace FMB.xcworkspace \
          -scheme "FMB" \
          -sdk iphoneos \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath $RUNNER_TEMP/FMB.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="FMB Ad Hoc" \
          DEVELOPMENT_TEAM="46Z55D38V7" \
          archive

      - name: Export IPA
        run: |
          EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
          cat > $EXPORT_OPTS_PATH << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.fmb.ios</key>
                  <string>FMB Ad Hoc</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/FMB.xcarchive -exportOptionsPlist $EXPORT_OPTS_PATH -exportPath ./artifacts

      - name: Upload IPA to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FMB-iOS
          path: ./artifacts/FMB.ipa

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/fmb-upload.keystore

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: fmb-upload.keystore
          KEYSTORE_PASSWORD: "*89Morokolo2021#"
          KEY_ALIAS: "fmb"
          KEY_PASSWORD: "*89Morokolo2021#"

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FMB-Android
          path: ./android/app/build/outputs/apk/release/app-release.apk